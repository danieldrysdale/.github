name: Python CI (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        type: string
        default: '3.12'
      requirements-file:
        description: 'Requirements file to install'
        type: string
        default: 'requirements-dev.txt'
      test-path:
        description: 'Path to tests directory'
        type: string
        default: 'tests/'
      docker-build:
        description: 'Whether to build and push a Docker image'
        type: boolean
        default: true
    secrets:
      ANTHROPIC_API_KEY:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ inputs.requirements-file }}" = "pyproject.toml" ]; then
            pip install -e ".[dev]" || pip install -e .
          elif [ -f "${{ inputs.requirements-file }}" ]; then
            pip install -r ${{ inputs.requirements-file }}
          elif [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" || pip install -e .
          else
            pip install -r requirements.txt
          fi

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest ${{ inputs.test-path }} -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && inputs.docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
